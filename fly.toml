# fly.toml app configuration file generated for ssh-profile on 2026-04-21T13:26:44Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ssh-profile'
primary_region = 'iad'

[build]

# SSH service (port 22)
[[services]]
  internal_port = 22
  protocol = 'tcp'

  [[services.ports]]
    port = 22

  [[services.tcp_checks]]
    grace_period = '5s'
    interval = '15s'
    timeout = '2s'

# HTTP hint page (port 80/443)
[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
